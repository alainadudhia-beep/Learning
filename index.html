<!DOCTYPE html>
<html>
  <head>
    <title>Motivation App</title>
    <style>
  body {
    font-family: Arial;
    text-align: center;
    margin-top: 100px;
    background-color: #f5f5f5;
  }

  h1 {
    font-size: 32px;
  }

  p {
    font-size: 20px;
    margin: 20px 0;
  }

  button {
    padding: 12px 24px;
    font-size: 16px;
    background-color: black;
    color: white;
    border: none;
    cursor: pointer;
  }

  button:hover {
    background-color: #333;
  }
</style>
  </head>
<script>
  function newMessage() {
    const messages = [
      "You’ve got this!",
      "Keep going!!",
      "Small steps still count ;)",
      "You’re learning fast :)",
      "Don’t overthink it x)"
    ];

    const randomIndex = Math.floor(Math.random() * messages.length);
    document.getElementById("message").innerText = messages[randomIndex];
  }
</script>
  <body>

    <h1>Motivation Generator</h1>
    <p id="message">Click the button to get motivated</p>

    <button onclick="newMessage()">Get message</button>

  </body>
</html>
